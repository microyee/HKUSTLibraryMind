<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – LibraryMind HKUST</title>
  <link rel="stylesheet" href="css/style.css?v=20260508" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100dvh; }
    .login-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem; background: var(--mist);
    }
    .login-card { width: 100%; max-width: 420px; }
    .login-brand {
      text-align: center; margin-bottom: 2rem;
    }
    .login-brand svg { margin: 0 auto .5rem; }
    .login-brand h1 { font-size: 1.6rem; margin-bottom: .25rem; }
    .login-brand p  { color: var(--text-muted); font-size: .88rem; }
  </style>
</head>
<body>

<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand" aria-label="HKUST LibraryMind home">
      <img src="assets/hkust_library_logo_transparent-bkgd-with-upper-space.png" alt="HKUST Lee Shau Kee Library" class="brand-logo" />
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="search.html">Catalog</a>
      <a href="research.html">Research AI</a>
      <a href="collections.html">Collections</a>
    </div>
    <div class="nav-actions">
      <div id="user-nav"></div>
      <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu" aria-expanded="false">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </div>
</nav>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-brand">
      <img src="assets/hkust_library_logo_transparent-bkgd-with-upper-space.png" alt="HKUST Lee Shau Kee Library" style="height:64px;width:auto;margin:0 auto .75rem;" />
      <h1>LibraryMind</h1>
      <p>Sign in to access reservations, thesis archives, and personalised research</p>
    </div>

    <div class="card">
      <div class="card-body">
        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="username">HKUST Username</label>
            <input class="form-input" id="username" type="text"
              placeholder="Your username" autocomplete="username" required />
            <span class="form-error" id="username-err" style="display:none"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div style="position:relative">
              <input class="form-input w-full" id="password" type="password"
                placeholder="Your password" autocomplete="current-password" required
                style="padding-right:2.75rem" />
              <button type="button" id="pw-toggle" aria-label="Show/hide password"
                style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);
                       background:none;border:none;cursor:pointer;color:var(--text-muted)">
                <svg id="pw-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
            <span class="form-error" id="password-err" style="display:none"></span>
          </div>

          <div id="form-error" class="form-error mb-1" style="display:none"></div>

          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            Sign In
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-small text-muted mt-2">
      <a href="index.html">← Back to library home</a>
    </p>
  </div>
</div>

<footer role="contentinfo" style="margin-top:0">
  <div class="footer-inner" style="justify-content:center">
    <p>© 2026 HKUST Library Services. LibraryMind is an internal research platform.</p>
  </div>
</footer>

<div id="toast-container" role="status" aria-live="polite"></div>

<script src="js/config.js?v=20260508"></script>
<script src="js/main.js"></script>
<script>
  // Redirect if already logged in
  getMe().then(u => { if (u) window.location.href = "index.html"; });

  // Password visibility toggle
  document.getElementById("pw-toggle").addEventListener("click", () => {
    const pw = document.getElementById("password");
    pw.type = pw.type === "password" ? "text" : "password";
  });

  // Form submit
  document.getElementById("login-form").addEventListener("submit", async e => {
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const errEl    = document.getElementById("form-error");
    const btn      = document.getElementById("login-btn");

    // Basic validation
    let valid = true;
    if (!username) {
      document.getElementById("username-err").textContent = "Username is required.";
      document.getElementById("username-err").style.display = "";
      document.getElementById("username").classList.add("error");
      valid = false;
    } else {
      document.getElementById("username-err").style.display = "none";
      document.getElementById("username").classList.remove("error");
    }
    if (!password) {
      document.getElementById("password-err").textContent = "Password is required.";
      document.getElementById("password-err").style.display = "";
      document.getElementById("password").classList.add("error");
      valid = false;
    } else {
      document.getElementById("password-err").style.display = "none";
      document.getElementById("password").classList.remove("error");
    }
    if (!valid) return;

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Signing in…`;

    try {
      const resp = await fetch(`${API_BASE}/api/auth/login`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        errEl.textContent = data.error || "Login failed.";
        errEl.style.display = "";
        btn.disabled = false;
        btn.textContent = "Sign In";
        return;
      }
      toast(`Welcome, ${data.user.username}!`, "success");
      setTimeout(() => { window.location.href = "index.html"; }, 700);
    } catch {
      errEl.textContent = "Cannot reach the server. Is the backend running?";
      errEl.style.display = "";
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  });
</script>
</body>
</html>
