<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog Search – LibraryMind HKUST</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand" aria-label="HKUST LibraryMind home">
      <img src="assets/hkust_library_logo_transparent-bkgd-with-upper-space.png" alt="HKUST Lee Shau Kee Library" class="brand-logo" />
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="search.html" class="active">Catalog</a>
      <a href="research.html">Research AI</a>
      <a href="collections.html">Collections</a>
    </div>
    <div class="nav-actions">
      <div id="user-nav"></div>
      <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu" aria-expanded="false">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>Catalog Search</h1>
    <p>Browse and search the HKUST library collection of 25,000+ titles</p>
  </div>
</div>

<main class="section">
  <div class="container">

    <!-- Search bar -->
    <form class="search-bar mb-3" id="search-form" role="search" aria-label="Book catalog search">
      <label for="q" class="sr-only">Search term</label>
      <input id="q" type="search" placeholder="Search title, author, subject…" autocomplete="off" />

      <label for="cat-filter" class="sr-only">Category</label>
      <select id="cat-filter" aria-label="Filter by category">
        <option value="">All categories</option>
      </select>

      <label class="flex items-center gap-1 text-small" style="white-space:nowrap;cursor:pointer">
        <input type="checkbox" id="avail-filter" style="accent-color:var(--navy)">
        Available only
      </label>

      <button type="submit" class="btn btn-primary">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/>
        </svg>
        Search
      </button>
    </form>

    <!-- Results header -->
    <div class="flex justify-between items-center mb-2">
      <p id="result-count" class="text-muted text-small" aria-live="polite">Loading…</p>
    </div>

    <!-- Book grid -->
    <div class="grid-3" id="book-grid" aria-live="polite" aria-label="Search results">
      <div class="card"><div class="skeleton" style="height:140px"></div><div class="card-body"><div class="skeleton mb-1" style="height:18px;width:80%"></div><div class="skeleton" style="height:14px;width:60%"></div></div></div>
      <div class="card"><div class="skeleton" style="height:140px"></div><div class="card-body"><div class="skeleton mb-1" style="height:18px;width:75%"></div><div class="skeleton" style="height:14px;width:55%"></div></div></div>
      <div class="card"><div class="skeleton" style="height:140px"></div><div class="card-body"><div class="skeleton mb-1" style="height:18px;width:85%"></div><div class="skeleton" style="height:14px;width:50%"></div></div></div>
      <div class="card"><div class="skeleton" style="height:140px"></div><div class="card-body"><div class="skeleton mb-1" style="height:18px;width:70%"></div><div class="skeleton" style="height:14px;width:65%"></div></div></div>
      <div class="card"><div class="skeleton" style="height:140px"></div><div class="card-body"><div class="skeleton mb-1" style="height:18px;width:80%"></div><div class="skeleton" style="height:14px;width:45%"></div></div></div>
      <div class="card"><div class="skeleton" style="height:140px"></div><div class="card-body"><div class="skeleton mb-1" style="height:18px;width:75%"></div><div class="skeleton" style="height:14px;width:60%"></div></div></div>
    </div>
  </div>
</main>

<!-- Book detail modal -->
<div class="modal-overlay" id="book-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Book Details</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()" aria-label="Close">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Close</button>
      <button class="btn btn-primary btn-sm" id="reserve-btn">Reserve</button>
    </div>
  </div>
</div>

<footer role="contentinfo">
  <div class="footer-inner">
    <div>
      <img src="assets/hkust_library_logo_transparent-bkgd-with-upper-space.png" alt="HKUST Lee Shau Kee Library" style="height:32px;width:auto;filter:brightness(0) invert(1);margin-bottom:.5rem;" />
      <div class="footer-brand">HKUST LibraryMind v2</div>
      <p style="margin-top:.4rem">The Hong Kong University of Science and Technology</p>
    </div>
    <div>
      <p style="font-weight:600;color:rgba(255,255,255,.8);margin-bottom:.5rem">Quick Links</p>
      <a href="research.html" style="display:block;margin-bottom:.25rem">Research AI</a>
      <a href="collections.html" style="display:block">Special Collections</a>
    </div>
  </div>
</footer>

<div id="toast-container" role="status" aria-live="polite"></div>

<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script>
  // ── Pre-populate from URL params ──────────────────────
  const params = new URLSearchParams(location.search);
  if (params.get("q"))        document.getElementById("q").value = params.get("q");
  if (params.get("category")) {
    // category select will be set after options load
  }

  // ── Load categories ───────────────────────────────────
  async function loadCats() {
    const resp = await fetch(`${API_BASE}/api/categories`);
    const data = await resp.json();
    const sel  = document.getElementById("cat-filter");
    data.categories.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c; opt.textContent = c;
      if (c === params.get("category")) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  // ── Search ────────────────────────────────────────────
  async function runSearch() {
    const q       = document.getElementById("q").value.trim();
    const cat     = document.getElementById("cat-filter").value;
    const avail   = document.getElementById("avail-filter").checked;

    const url = new URL(`${API_BASE}/api/books`);
    if (q)     url.searchParams.set("q", q || "a");
    if (cat)   url.searchParams.set("category", cat);
    if (avail) url.searchParams.set("available", "true");

    const resp = await fetch(url);
    const data = await resp.json();
    const grid = document.getElementById("book-grid");

    document.getElementById("result-count").textContent =
      `${data.count} result${data.count !== 1 ? "s" : ""}`;

    if (!data.books.length) {
      grid.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:3rem 0">
          <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="var(--border)" style="margin:0 auto .75rem" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
          </svg>
          <p class="text-muted">No books found for your search.</p>
          <button class="btn btn-outline btn-sm mt-2" onclick="clearSearch()">Clear filters</button>
        </div>`;
      return;
    }
    grid.innerHTML = data.books.map(bookCardHTML).join("");
  }

  function clearSearch() {
    document.getElementById("q").value = "";
    document.getElementById("cat-filter").value = "";
    document.getElementById("avail-filter").checked = false;
    runSearch();
  }

  document.getElementById("search-form").addEventListener("submit", e => {
    e.preventDefault(); runSearch();
  });

  // ── Modal ─────────────────────────────────────────────
  let _currentBookId = null;
  async function openBook(id) {
    _currentBookId = id;
    const resp = await fetch(`${API_BASE}/api/books/${id}`);
    if (!resp.ok) { toast("Book not found", "error"); return; }
    const b = await resp.json();
    const avail = b.available
      ? `<span class="badge badge-green">Available — ${b.copies} cop${b.copies===1?"y":"ies"}</span>`
      : `<span class="badge badge-red">Checked Out</span>`;
    document.getElementById("modal-title").textContent = b.title;
    document.getElementById("modal-body").innerHTML = `
      <p class="text-muted text-small mb-1">${esc(b.author)} &bull; ${esc(String(b.year))}</p>
      <div class="flex gap-1 mb-2" style="flex-wrap:wrap">
        ${avail}
        <span class="badge badge-navy">${esc(b.category)}</span>
        <span class="badge badge-gray">${esc(b.location)}</span>
      </div>
      <p>${esc(b.description)}</p>
      <p class="text-small text-muted mt-2">ISBN: ${esc(b.isbn)}</p>`;
    document.getElementById("book-modal").classList.add("open");
  }
  function closeModal() {
    document.getElementById("book-modal").classList.remove("open");
  }
  document.getElementById("reserve-btn").addEventListener("click", async () => {
    const user = await getMe();
    if (!user) { toast("Please sign in to reserve books", "error"); return; }
    toast("Reservation submitted!", "success");
    closeModal();
  });
  document.getElementById("book-modal").addEventListener("click", e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // ── Init ──────────────────────────────────────────────
  loadCats().then(runSearch);
</script>
</body>
</html>
